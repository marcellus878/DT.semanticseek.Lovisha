{% extends "base.html" %}

{% block content %}

<h2 style="color:white;">Explore Items</h2>

<form method="GET" action="/explore" style="margin-bottom:20px;">
    <input type="text" name="q" placeholder="Search items..." value="{{ query if query else '' }}">
    <button type="submit">Search</button>
</form>

{% if items|length == 0 %}
<p style="color:white;">No items found.</p>
{% endif %}

{% for item in items %}
<div class="card">

    <b>{{ item[2] }}</b><br> <!-- title -->

    {% if item[6] %}
    <img src="/static/uploads/{{ item[6] }}" width="150"><br>
    {% endif %}

    {{ item[3] }}<br> <!-- description -->

    Status: {{ item[4] }}<br>
    Time: {{ item[5] }}<br>

    

</div>
{% endfor %}

{% endblock %}
