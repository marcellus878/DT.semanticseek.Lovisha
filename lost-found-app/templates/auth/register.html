{% extends "base.html" %}

{% block content %}

<div class="card">
    <h2>Register</h2>

    <!-- 🔴 ERROR MESSAGE -->
    {% if error %}
    <p style="color: #ff4444; background: #220000; padding: 10px; border-radius: 6px;">
        {{ error }}
    </p>
    {% endif %}

    <form method="POST">

        <input type="text" name="name" placeholder="Full Name" required><br><br>

        <!-- 🔥 USERNAME (UNIQUE) -->
        <input type="text" name="username" placeholder="Username (must be unique)" required><br><br>

        <input type="email" name="email" placeholder="Email" required><br><br>

        <input type="password" name="password" placeholder="Password" required><br><br>

        <button type="submit">Register</button>

    </form>

    <br>

    <!-- 🔗 LOGIN LINK -->
    <p style="color: #aaa;">
        Already have an account?
        <a href="/login" style="color:#00ffcc;">Login</a>
    </p>
</div>

{% endblock %}
